name: job_platform
description: "Job Platform mobile app - Find and post jobs with ease"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.1.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.1.0
  
  # HTTP Client
  dio: ^5.3.1
  
  # Routing
  go_router: ^14.3.0
  
  # Secure Storage
  flutter_secure_storage: ^9.0.0
  
  # UI Components
  cupertino_icons: ^1.0.2
  flutter_spinkit: ^5.2.0
  
  # Date & Time
  intl: ^0.19.0
  
  # JSON Serialization
  json_annotation: ^4.8.1
  
  # Utilities
  uuid: ^4.0.0
  connectivity_plus: ^5.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0
  
  build_runner: ^2.4.6
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
  
  fonts:
    - family: Roboto
      fonts:
        - asset: assets/fonts/Roboto-Regular.ttf
        - asset: assets/fonts/Roboto-Bold.ttf
          weight: 700
