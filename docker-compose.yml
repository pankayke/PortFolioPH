services:
  portfolioph:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        FLUTTER_VERSION: "3.38.7"
    image: portfolioph:latest
    container_name: portfolioph
    restart: unless-stopped
    ports:
      - "8080:80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/index.html"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
