services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: job_platform_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: job_platform
      MYSQL_ROOT_PASSWORD: root
      MYSQL_PASSWORD: password
      MYSQL_USER: jobuser
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - job-network

  # Laravel API
  api:
    build:
      context: ./backend
      dockerfile: ../docker/Dockerfile
    image: job_platform_api:latest
    container_name: job_platform_api
    restart: unless-stopped
    environment:
      APP_NAME: "Job Platform"
      APP_ENV: development
      APP_KEY: base64:/pLDTArcIFVj+PpLq2ZVRs0HcLrVN+p8xDXAH4x0IYo=
      APP_DEBUG: "true"
      APP_URL: http://localhost:8000
      APP_TIMEZONE: UTC
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: job_platform
      DB_USERNAME: jobuser
      DB_PASSWORD: password
      CACHE_DRIVER: file
      QUEUE_CONNECTION: sync
      SESSION_DRIVER: cookie
      MAIL_MAILER: smtp
      MAIL_HOST: mailpit
      MAIL_PORT: 1025
      MAIL_USERNAME: ""
      MAIL_PASSWORD: ""
      MAIL_ENCRYPTION: "null"
      MAIL_FROM_ADDRESS: "noreply@jobplatform.test"
      MAIL_FROM_NAME: "Job Platform"
      SANCTUM_STATEFUL_DOMAINS: localhost:8000,127.0.0.1:8000
      SESSION_DOMAIN: localhost
    ports:
      - "9000:9000"
    volumes:
      - ./backend:/app
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - job-network

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: job_platform_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "8000:8000"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf
      - ./backend:/app
    depends_on:
      - api
    networks:
      - job-network

  # Mailpit (Email Testing)
  mailpit:
    image: axllent/mailpit:latest
    container_name: job_platform_mailpit
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - job-network

  # PhpMyAdmin (Database Management)
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: job_platform_phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: mysql
      PMA_USER: jobuser
      PMA_PASSWORD: password
      PMA_ROOT_PASSWORD: root
    ports:
      - "8080:80"
    depends_on:
      - mysql
    networks:
      - job-network

volumes:
  mysql_data:

networks:
  job-network:
    driver: bridge
