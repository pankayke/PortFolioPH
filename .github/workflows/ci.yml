name: Flutter CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  root-app-quality:
    name: Root App Quality Gates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Enforce formatting
        run: dart format --set-exit-if-changed lib test

      - name: Static analysis
        run: flutter analyze

      - name: Unit and widget tests
        run: flutter test --no-pub

  mobile-module-quality:
    name: Mobile Module Quality Gates
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile-jobs
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Enforce formatting
        run: dart format --set-exit-if-changed lib test

      - name: Static analysis
        run: flutter analyze

      - name: Unit and widget tests
        run: |
          if [ -d test ]; then
            flutter test --no-pub
          else
            echo "No tests directory found in mobile-jobs; skipping tests."
          fi
