name: Android Release Pipeline

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to build'
        required: true
        default: 'develop'
      upload_to_playstore:
        description: 'Set to true to upload the AAB to Play Console'
        required: false
        default: 'false'
      package_name:
        description: 'Android package name (com.example.app)'
        required: false
        default: 'com.yourcompany.portfolioph'

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.10.7'

      - name: Decode Android keystore
        if: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}
        run: |
          mkdir -p android/app
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/release-signing.jks

      - name: Write key.properties
        run: |
          mkdir -p android
          cat > android/key.properties <<'EOF'
storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
storeFile=release-signing.jks
EOF

      - name: Flutter pub get
        run: flutter pub get

      - name: Build App Bundle (AAB)
        env:
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
        run: |
          flutter build appbundle -t lib/main_production.dart --release --dart-define=API_BASE_URL=${API_BASE_URL}

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release.aab
          path: build/app/outputs/bundle/release/app-release.aab

      - name: Upload AAB to Play Store (optional)
        if: ${{ github.event.inputs.upload_to_playstore == 'true' && secrets.PLAY_STORE_SERVICE_ACCOUNT_JSON != '' }}
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJson: ${{ secrets.PLAY_STORE_SERVICE_ACCOUNT_JSON }}
          packageName: ${{ github.event.inputs.package_name }}
          releaseFiles: build/app/outputs/bundle/release/app-release.aab
          track: internal
