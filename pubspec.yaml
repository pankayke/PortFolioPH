name: portfolioph
description: "PortFolioPH – Offline-first Flutter Android portfolio builder for students."
publish_to: 'none'

# ─── Version ─────────────────────────────────────────────────────────────────
version: 1.0.0+1

environment:
  sdk: ^3.10.7

# ─── Dependencies ─────────────────────────────────────────────────────────────
dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8

  # State management
  provider: ^6.1.2

  # Routing
  go_router: ^14.3.0

  # Local database (offline-first)
  sqflite: ^2.3.3+1
  sqflite_common_ffi_web: ^1.1.1
  path_provider: ^2.1.4
  path: ^1.9.0

  # Persistent key-value storage (session, settings)
  shared_preferences: ^2.3.3

  # Runtime permissions
  permission_handler: ^11.3.1

  # Cryptography (password hashing)
  crypto: ^3.0.5

  # Image handling
  image_picker: ^1.1.2
  cached_network_image: ^3.4.1

  # Utilities
  intl: ^0.20.2
  uuid: ^4.5.1
  flutter_svg: ^2.0.10+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.13

# ─── Flutter section ──────────────────────────────────────────────────────────
flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package
