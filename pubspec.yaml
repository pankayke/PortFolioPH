name: portfolioph
description: "PortFolioPH – Online-first Flutter app for applicants, recruiters, academics. Real-time API integration (NO local SQLite)."
publish_to: 'none'

# ─── Version ─────────────────────────────────────────────────────────────────
version: 1.0.0-online+1

environment:
  sdk: ^3.10.7

# ─── Dependencies ─────────────────────────────────────────────────────────────
dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8

  # State management
  provider: ^6.1.2

  # Functional programming - Either/Failure pattern for Clean Architecture
  dartz: ^0.10.1

  # Value equality
  equatable: ^2.0.5

  # Routing
  go_router: ^14.3.0

  # Persistent key-value storage (settings, preferences only)
  shared_preferences: ^2.3.3

  # Secure token storage (auth tokens only)
  flutter_secure_storage: ^9.2.2

  # HTTP client (real-time API calls)
  dio: ^5.6.0

  # JSON serialization
  json_annotation: ^4.9.0

  # Runtime permissions
  permission_handler: ^11.3.1

  # Cryptography (password hashing)
  crypto: ^3.0.5

  # Image handling
  image_picker: ^1.1.2
  file_picker: ^10.1.9
  cached_network_image: ^3.4.1

  # Utilities
  intl: ^0.20.2
  uuid: ^4.5.1
  path: ^1.9.1
  path_provider: ^2.1.5
  flutter_svg: ^2.0.10+1
  pdf: ^3.11.1
  sentry_flutter: ^8.14.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  json_serializable: ^6.8.0
  flutter_launcher_icons: ^0.14.3

  # Testing - Unit & Mock
  mockito: ^5.4.4

flutter_launcher_icons:
  android: true
  ios: false
  image_path: assets/icons/app_icon.png
  adaptive_icon_background: "#0D47A1"
  adaptive_icon_foreground: assets/icons/app_icon.png

# ─── Flutter section ──────────────────────────────────────────────────────────
flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/templates/
