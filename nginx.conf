server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Charset & mime fixes ────────────────────────────────────────────────
    charset utf-8;

    # Serve .wasm files with the correct MIME type
    types {
        application/wasm                   wasm;
        application/javascript             js mjs;
        text/html                          html htm;
        text/css                           css;
        image/png                          png;
        image/jpeg                         jpg jpeg;
        image/svg+xml                      svg svgz;
        application/json                   json;
        font/woff2                         woff2;
        font/woff                          woff;
    }

    # ── Compression ─────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml
        font/woff
        font/woff2;

    # ── Security headers ─────────────────────────────────────────────────────
    add_header X-Frame-Options       "SAMEORIGIN"  always;
    add_header X-Content-Type-Options "nosniff"    always;
    add_header Referrer-Policy       "strict-origin-when-cross-origin" always;

    # ── Service-worker scope ─────────────────────────────────────────────────
    # sqflite_sw.js must NOT be cached by the browser so updates take effect
    location = /sqflite_sw.js {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        try_files $uri =404;
    }

    # ── Flutter assets — long-term cache (hashed filenames) ─────────────────
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    location /canvaskit/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # ── WASM — long-term cache ───────────────────────────────────────────────
    location ~* \.wasm$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header Cross-Origin-Embedder-Policy "require-corp";
        add_header Cross-Origin-Opener-Policy   "same-origin";
        try_files $uri =404;
    }

    # ── Flutter main.dart.js — do not cache (changes on every deploy) ────────
    location ~* main\.dart\.js$ {
        add_header Cache-Control "no-store";
        try_files $uri =404;
    }

    # ── SPA fallback — all unmatched paths return index.html ─────────────────
    # This allows go_router to handle client-side navigation.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
